---
all:
  children:
    routers:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ansible_playbook_python}}"

          # Required configuration parameters
          router_wan_interface: "enp1s0"
          router_lan_interface: "enp7s0"

          # Optional configuration parameters can be found here:
          # soho-router/defaults/main.yml

          router_hostname: "cs10-router"
          router_domain: "centos-stream-testing.internal"

          router_lan_network: "192.10.20.1/24"

          # Cloudflare 1.1.1.1 for Families - Block malware
          dhcp_primary_dns: "1.1.1.2"
          dhcp_secondary_dns: "1.0.0.2"

          dhcp_client_pool_start: "192.10.20.100"
          dhcp_client_pool_end: "192.10.20.250"
