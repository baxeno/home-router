---
# tasks file for soho-router

# -----------------------------------------------------------------------------
# Calculate configuration parameters
# -----------------------------------------------------------------------------
- name: Calculate configuration parameters
  set_fact:
    router_lan_subnet: "{{ router_lan_network | ansible.utils.ipaddr('network') }}/{{ router_lan_network | ansible.utils.ipaddr('prefix') }}"
    dhcp_router_ip: "{{ router_lan_network | ansible.utils.ipaddr('address') }}"

# -----------------------------------------------------------------------------
# Check configuration parameters
# -----------------------------------------------------------------------------
- name: Check configuration parameters
  ansible.builtin.debug:
    msg:
      - "router_hostname: {{ router_hostname }}"
      - "router_wan_interface: {{ router_wan_interface }}"
      - "router_lan_interface: {{ router_lan_interface }}"
      - "router_bridge_interface: {{ router_bridge_interface }}"
      - "router_domain: {{ router_domain }}"
      - "router_lan_network: {{ router_lan_network }}"
      - "router_lan_subnet: {{ router_lan_subnet }}"
      - "dhcp_router_ip: {{ dhcp_router_ip }}"
      - "dhcp_primary_dns: {{ dhcp_primary_dns }}"
      - "dhcp_secondary_dns: {{ dhcp_secondary_dns }}"
      - "dhcp_client_pool_start: {{ dhcp_client_pool_start }}"
      - "dhcp_client_pool_end: {{ dhcp_client_pool_end }}"

- name: Fail when 'router_wan_interface', 'router_bridge_interface' or 'router_lan_interface' variables are empty
  fail:
    msg: Missing interfaces in configuration, run 'nmcli' to discover valid interface names.
  when: (router_wan_interface | length == 0) or
        (router_bridge_interface | length == 0) or
        (router_lan_interface | length == 0)

# -----------------------------------------------------------------------------
# Setup basic host configuration and SSH server
# -----------------------------------------------------------------------------

- name: Set hostname ({{ router_hostname }}) using systemd strategy
  become: true
  ansible.builtin.hostname:
    name: "{{ router_hostname }}"
    use: systemd

- name: OpenSSH server hardening
  become: true
  ansible.builtin.copy:
    src: files/sshd_config.d/08-home-router-sshd.conf
    dest: /etc/ssh/sshd_config.d/08-home-router-sshd.conf
    owner: root
    group: root
    mode: '0644'

# -----------------------------------------------------------------------------
# Setup interfaces and bridge in NetworkManager
# -----------------------------------------------------------------------------
- name: Load kernel modules
  become: true
  ansible.builtin.copy:
    src: files/modules-load.d/10-kernel-router.conf
    dest: /etc/modules-load.d/10-kernel-router.conf
    owner: root
    group: root
    mode: '0644'

- name: Setup WAN interface ({{ router_wan_interface }})
  become: true
  community.general.nmcli:
    type: ethernet
    conn_name: "{{ router_wan_interface }}"
    autoconnect: true
    method4: auto
    method6: auto
    zone: external
    state: present

- name: Setup bridge interface ({{ router_bridge_interface }})
  become: true
  community.general.nmcli:
    type: bridge
    conn_name: "{{ router_bridge_interface }}"
    autoconnect: true
    method4: manual
    method6: link-local
    ip4: "{{ router_lan_network }}"
    stp: false
    zone: internal
    state: present

- name: Setup LAN interface ({{ router_lan_interface }})
  become: true
  community.general.nmcli:
    type: ethernet
    conn_name: "{{ router_lan_interface }}"
    autoconnect: true
    method4: disabled
    method6: disabled
    slave_type: bridge
    master: "{{ router_bridge_interface }}"
    zone: internal
    state: present

# -----------------------------------------------------------------------------
# Setup DHCPv4 server
# -----------------------------------------------------------------------------
- name: Install ISC Kea DHCPv4/DHCPv6 server
  become: true
  ansible.builtin.dnf:
    name: kea
    state: present

- name: Configure ISC Kea DHCPv4 server based on template
  become: true
  ansible.builtin.template:
    src: templates/kea-dhcp4.conf.j2
    dest: /etc/kea/kea-dhcp4.conf
    owner: root
    group: kea
    mode: '0640'
  notify:
    - Restart Kea DHCPv4 service

- name: Enable ISC Kea DHCPv4 systemd service
  become: true
  ansible.builtin.systemd_service:
    name: kea-dhcp4.service
    state: started
    enabled: true

# -----------------------------------------------------------------------------
# Configure allowed IP traffic in firewalld
# -----------------------------------------------------------------------------
- name: Assign WAN interface ({{ router_wan_interface }}) to external zone
  become: true
  ansible.posix.firewalld:
    zone: external
    interface: "{{ router_wan_interface }}"
    permanent: true
    state: enabled
  notify:
    - Restart firewalld service

- name: Assign LAN interface ({{ router_lan_interface }}) to internal zone
  become: true
  ansible.posix.firewalld:
    zone: internal
    interface: "{{ router_lan_interface }}"
    permanent: true
    state: enabled
  notify:
    - Restart firewalld service

- name: Assign bridge interface ({{ router_bridge_interface }}) to internal zone
  become: true
  ansible.posix.firewalld:
    zone: internal
    interface: "{{ router_bridge_interface }}"
    permanent: true
    state: enabled
  notify:
    - Restart firewalld service

- name: Allow all traffic from internal zone
  become: true
  ansible.posix.firewalld:
    target: ACCEPT
    state: enabled
    permanent: true
    zone: internal
  notify:
    - Restart firewalld service

- name: Do not permit unused services in external zone
  become: true
  ansible.posix.firewalld:
    zone: external
    service: "{{ item }}"
    permanent: true
    state: disabled
  loop:
    - ssh
  notify:
    - Restart firewalld service

- name: Do not permit unused services in internal zone
  become: true
  ansible.posix.firewalld:
    zone: internal
    service: "{{ item }}"
    permanent: true
    state: disabled
  loop:
    - samba-client
    - cockpit
    - mdns
  notify:
    - Restart firewalld service

- name: Permit used services in internal zone
  become: true
  ansible.posix.firewalld:
    zone: internal
    service: "{{ item }}"
    permanent: true
    state: enabled
  loop:
    - dhcp
    - ssh
  notify:
    - Restart firewalld service
