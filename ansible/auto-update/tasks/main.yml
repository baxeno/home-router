---
# tasks file for auto-update

- name: Unsupported distributions and operating system
  fail:
    msg: "Use Fedora Server for latest hardware support and AlmaLinux for LTS on supported hardware"
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'RedHat') or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 34) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'CentOS' and ansible_facts['distribution_major_version']|int <= 9) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'AlmaLinux' and ansible_facts['distribution_major_version']|int <= 9) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Scientific') or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'CloudLinux') or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'OracleLinux') or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Amazon') or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'XenServer') or
        (ansible_facts['os_family'] == 'Debian') or
        (ansible_facts['os_family'] == 'Suse') or
        (ansible_facts['os_family'] == 'Gentoo') or
        (ansible_facts['os_family'] == 'Archlinux') or
        (ansible_facts['os_family'] == 'Mandrake') or
        (ansible_facts['os_family'] == 'HP-UX') or
        (ansible_facts['os_family'] == 'AIX') or
        (ansible_facts['os_family'] == 'Solaris') or
        (ansible_facts['os_family'] == 'FreeBSD') or
        (ansible_facts['os_family'] == 'Darwin') or
        (ansible_facts['os_family'] == 'Windows')

- name: Supported Linux distribution has reached End-of-Life (EoL)
  fail:
    msg: "Warning: Use newer version of Fedora Server"
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 41)
  ignore_errors: True

# -----------------------------------------------------------------------------
# dnf4: unattended auto updates based on legacy Fedora
# -----------------------------------------------------------------------------
- name: Install package for auto update (dnf4)
  become: true
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 40) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int <= 10)

- name: Directory for dnf-automatic-install override (dnf4)
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic-install.timer.d
    owner: root
    group: root
    state: directory
    mode: 0755
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 40) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int <= 10)

- name: Enable weekly OS auto updates (dnf4)
  become: true
  ansible.builtin.copy:
    src: files/dnf-override.conf
    dest: /etc/systemd/system/dnf-automatic-install.timer.d/dnf-override.conf
    owner: root
    group: root
    mode: 0444
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 40) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int <= 10)

- name: Reboot after updates if needed (dnf4)
  become: true
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: '^reboot = '
    line: 'reboot = when-changed'
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 40) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int <= 10)

- name: Enable automatic updates (dnf4)
  become: true
  ansible.builtin.systemd_service:
    name: dnf-automatic-install.timer
    state: started
    enabled: true
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int <= 40) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int <= 10)

# -----------------------------------------------------------------------------
# dnf5: unattended auto updates based on modern Fedora
# -----------------------------------------------------------------------------
- name: Install package for auto update (dnf5)
  become: true
  ansible.builtin.dnf:
    name: dnf5-plugin-automatic, libcurl-full
    allowerasing: true
    state: present
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int >= 41) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int >= 11)

- name: Directory for dnf5-automatic override (dnf5)
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/dnf5-automatic.timer.d
    owner: root
    group: root
    state: directory
    mode: 0755
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int >= 41) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int >= 11)

- name: Weekly OS auto updates (dnf5)
  become: true
  ansible.builtin.copy:
    src: files/dnf-override.conf
    dest: /etc/systemd/system/dnf5-automatic.timer.d/dnf-override.conf
    owner: root
    group: root
    mode: 0644
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int >= 41) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int >= 11)

- name: Reboot after updates if needed (dnf5)
  become: true
  ansible.builtin.copy:
    src: files/automatic.conf
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: 0644
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int >= 41) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int >= 11)

- name: Enable automatic updates (dnf5)
  become: true
  ansible.builtin.systemd_service:
    name: dnf5-automatic.timer
    state: started
    enabled: true
  when: (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int >= 41) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora' and ansible_facts['distribution_major_version']|int >= 11)

# -----------------------------------------------------------------------------
# Make sure system is up-to-date
# -----------------------------------------------------------------------------
- name: Upgrade all packages
  become: true
  ansible.builtin.dnf:
    name: "*"
    allowerasing: true
    state: latest
  when: ansible_facts['os_family'] == 'RedHat'

