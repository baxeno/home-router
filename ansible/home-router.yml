---
- hosts: routers
  tasks:
    - name: Bootstrap host requirements and check OS requirements
      ansible.builtin.include_role:
        name: os-requirements

- hosts: routers
  tasks:
    - name: Setup router
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop:
        - auto-update
        - soho-router
